name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: react-app/package-lock.json

      - name: Install dependencies
        working-directory: react-app
        run: npm ci

      - name: Build React app
        working-directory: react-app
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/demo/app

          # 既存のルート静的サイトをコピー
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'react-app' \
            ./ _site/

          # Reactアプリのbuild結果を /app/kotenseki_annotation/ に配置
          rsync -av react-app/dist/ _site/demo/app/kotenseki_annotation/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
